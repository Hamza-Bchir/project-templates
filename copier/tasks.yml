_tasks:
  - ["python", "-c", "import pathlib; p=pathlib.Path('.env'); p.write_text(p.read_text().replace('__PROJECT_ROOT__', str(pathlib.Path.cwd().resolve())))"]
  - ["git", "init", "--initial-branch=main"]
  - ["uv", "venv", "--python", "{{ python_version }}"]
  - ["uv", "sync", "--all-extras"]
  - ["uv", "run", "pre-commit", "install"]
  - ["git", "add", "."]
  - ["powershell", "-NoProfile", "-Command", "uv run pre-commit run --all-files; exit 0"]
  - ["git", "add", "."]
  - ["git", "commit", "-m", "Initial commit"]